name: Test
# Layer 1.5D.5 CI workflow: lint + test on push and PR.
# Tests that need data/raw/ or data/cache/ are gitignored, so CI only
# runs the subset that exercises pure logic + mocked fixtures (~150-200
# of the 367 local tests). The data-dependent tests pass locally because
# the dev cache is populated; CI doesn't have that, so we explicitly
# limit to the offline-safe subset.
on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install project + dev deps
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Ruff check
        run: |
          source .venv/bin/activate
          ruff check .

      # The "offline-safe" test subset — pure logic + mocked-network
      # tests. Tests that require data/raw/ or data/cache/ are not in
      # this list and stay green only locally where the dev cache is
      # populated.
      - name: Pytest (offline subset)
        env:
          # FRED_API_KEY is required at config import time. Use a dummy
          # value; the test subset never makes a real FRED call.
          FRED_API_KEY: "0123456789abcdef0123456789abcdef"
        run: |
          source .venv/bin/activate
          pytest tests/test_unit_conversion.py \
                 tests/test_atomic_cache.py \
                 tests/test_signal_probability.py \
                 tests/test_confidence.py \
                 tests/test_conviction.py \
                 tests/test_crps_weights.py \
                 tests/test_quality_caps.py \
                 tests/test_pipeline_flags.py \
                 tests/test_exceptions.py \
                 tests/test_offline_mocks.py \
                 -v --tb=short

      - name: Upload pytest output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output
          path: |
            .pytest_cache/
            **/pytest-output.txt
          if-no-files-found: ignore
