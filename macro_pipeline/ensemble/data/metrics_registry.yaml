  layer_origin: L6
  unit: ratio
  update_frequency: on_request
  description_l1: "How much extra return you get for each one-percent maximum drawdown."
  description_l2: "Calmar = annualised excess return / |maximum drawdown|; pain-adjusted Sharpe alternative. Sensitive to single worst-drawdown event."
  description_l3: "Young (1991); typically computed over a fixed window (3Y or 5Y) to limit single-event sensitivity. Pairs naturally with Sortino for downside-risk-focused performance evaluation."
