registry_version: 1
n_metrics: 90
# Vision v2.0 §3 ninety-measurement catalogue.
# Ordered by (subcategory_index, metric_id) for stable diffs.
# Per L6-A: subcategory names use Vision §3 statistical taxonomy
# (probability / uncertainty / ...) NOT Strategic-hypothesis macro-thematic
# names (valuation / macro_regime / ...). See macro_pipeline/ensemble/metadata.py
# module docstring for reconciliation note.
# Per L6-A Strategic Risk #2: computation_path null until L6-G populates;
# deferred_to null at L6-A unless explicitly L7/L8a per D7 split.
metrics:

# ============================================================================
# §3.1 — Probability measures (8)
# ============================================================================

- metric_id: cumulative_distribution_function
  name: "Cumulative distribution function F(x)"
  subcategory: probability
  subcategory_index: 1
  layer_origin: L6
  unit: probability
  update_frequency: on_request
  description_l1: "The chance the outcome is at or below a chosen value."
  description_l2: "F(x) = P(X <= x); the running total of probability up to the threshold x. Used to convert a forecast distribution into single-number probabilities."
  description_l3: "F: R -> [0, 1], non-decreasing, right-continuous, F(-inf)=0, F(+inf)=1. Empirical CDF F_n(x) = (1/n) sum 1{X_i <= x} converges to F per Glivenko-Cantelli."
  range_min: 0.0
  range_max: 1.0
  typical_range: [0.0, 1.0]
  invert_for_signal: false
  citations: ["Casella-Berger (2002) §1.5"]

- metric_id: probability_conditional
  name: "Conditional probability P(A|B)"
  subcategory: probability
  subcategory_index: 1
  layer_origin: L6
  unit: probability
  update_frequency: on_request
  description_l1: "How likely outcome A is when we already know outcome B happened."
  description_l2: "P(A|B) = P(A and B) / P(B) when P(B) > 0. Updating a probability given new information; core to all Bayesian reasoning."
  description_l3: "Defined on (Omega, F, P) probability space; satisfies sigma-additivity in A. Drives Bayes' theorem P(A|B) = P(B|A)P(A)/P(B)."
  range_min: 0.0
  range_max: 1.0
  typical_range: [0.0, 1.0]
  invert_for_signal: false
  citations: ["Kolmogorov (1933)"]

- metric_id: probability_joint
  name: "Joint probability P(A and B)"
  subcategory: probability
  subcategory_index: 1
  layer_origin: L6
  unit: probability
  update_frequency: on_request
  description_l1: "How likely two outcomes both happen at the same time."
  description_l2: "P(A and B) for events A, B; factors as P(A)P(B|A). Equal to product P(A)P(B) iff A and B independent."
  description_l3: "Defined via the product sigma-algebra; independence iff P(A and B) = P(A)P(B) for all A in F_A, B in F_B."
  range_min: 0.0
  range_max: 1.0
  typical_range: [0.0, 1.0]
  invert_for_signal: false
  citations: ["Kolmogorov (1933)"]

- metric_id: probability_outcome
  name: "Marginal probability P(outcome)"
  subcategory: probability
  subcategory_index: 1
  layer_origin: L6
  unit: probability
  update_frequency: on_request
  description_l1: "How likely a single outcome is, all things considered."
  description_l2: "P(outcome) is the marginal probability of a specific event; the headline forecast quantity reported alongside confidence + conviction (Vision §4)."
  description_l3: "Marginal P(A) = integral P(A|theta) dPi(theta) under prior Pi (Bayesian posterior predictive). Vision §4 requires CI lower/upper alongside the point estimate."
  range_min: 0.0
  range_max: 1.0
  typical_range: [0.0, 1.0]
  invert_for_signal: false
  citations: ["Vision v2.0 §4"]

- metric_id: probability_union
  name: "Union probability P(A or B)"
  subcategory: probability
  subcategory_index: 1
  layer_origin: L6
  unit: probability
  update_frequency: on_request
  description_l1: "How likely at least one of two outcomes happens."
  description_l2: "P(A or B) = P(A) + P(B) - P(A and B). Inclusion-exclusion principle; central to compound-event reasoning."
  description_l3: "Generalises to P(union_i A_i) = sum_i P(A_i) - sum_{i<j} P(A_i and A_j) + ... per Bonferroni inclusion-exclusion expansion."
  range_min: 0.0
  range_max: 1.0
  typical_range: [0.0, 1.0]
  invert_for_signal: false
  citations: ["Bonferroni (1936)"]

- metric_id: quantile_function
  name: "Quantile function q_p"
  subcategory: probability
  subcategory_index: 1
  layer_origin: L6
  unit: native_units
  update_frequency: on_request
  description_l1: "The value below which a chosen fraction of outcomes fall."
  description_l2: "q_p = inf{x : F(x) >= p}; the inverse of the CDF. Vision UI shows 5/10/25/50/75/90/95 percentiles by default per §1 Pillar 4."
  description_l3: "Generalized inverse Q(p) = inf{x : F(x) >= p}; coincides with F^{-1}(p) when F is strictly increasing. Used for distributional summaries + risk metrics (VaR = q_alpha of loss)."
  invert_for_signal: false
  citations: ["Hyndman-Fan (1996)"]

- metric_id: survival_function
  name: "Survival function S(x)"
  subcategory: probability
  subcategory_index: 1
  layer_origin: L6
  unit: probability
  update_frequency: on_request
  description_l1: "The chance the outcome exceeds a chosen value."
  description_l2: "S(x) = P(X > x) = 1 - F(x). Used for tail-event framing; same information as CDF, different conventional emphasis."
  description_l3: "Common in survival analysis + tail-risk; hazard function h(x) = -d log S(x) / dx. Complementary representation to F(x) for continuous distributions."
  range_min: 0.0
  range_max: 1.0
  typical_range: [0.0, 1.0]
  invert_for_signal: false
  citations: ["Kalbfleisch-Prentice (2002)"]

- metric_id: tail_probability
  name: "Tail probability P(X > x_threshold)"
  subcategory: probability
  subcategory_index: 1
  layer_origin: L6
  unit: probability
  update_frequency: on_request
  description_l1: "How likely the outcome is bigger than a threshold of interest."
  description_l2: "P(X > x) where x is an institutionally meaningful threshold (e.g., drawdown > 35%; return < -20%). Vision §1 Pillar 4 mandates tail probabilities alongside central estimates."
  description_l3: "For thresholds in the distribution tail (typically beyond 95th or below 5th percentile); extreme value theory (Pickands 1975; Generalized Pareto fit) supports the parametric tail when N is small."
  range_min: 0.0
  range_max: 1.0
  typical_range: [0.0, 0.5]
  invert_for_signal: false
  citations: ["Pickands (1975)", "McNeil-Frey-Embrechts (2005)"]

# ============================================================================
# §3.2 — Uncertainty measures (7)
# ============================================================================

- metric_id: analog_dispersion_sigma
  name: "Analog-period dispersion sigma"
  subcategory: uncertainty
  subcategory_index: 2
  layer_origin: L6
  unit: native_units
  update_frequency: on_request
  description_l1: "How spread out the historical look-alikes are."
  description_l2: "Cross-analog standard deviation of forecast targets across the top reference-class matches. One of the three sigma values in Vision §5 Triple sigma reporting."
  description_l3: "sigma_analog = sqrt((1/(K-1)) sum_{k=1..K} (y_k - mean(y))^2) over K reference-class analogs identified per Vision §6 cosine-similarity scoring on the eight-dimensional macro state vector."
  invert_for_signal: false
  citations: ["Vision v2.0 §5", "Tetlock-Gardner (2015) §10"]

- metric_id: confidence_interval
  name: "Confidence interval (frequentist)"
  subcategory: uncertainty
  subcategory_index: 2
  layer_origin: L6
  unit: native_units
  update_frequency: on_request
  description_l1: "A range where the true value probably falls."
  description_l2: "Frequentist CI: [theta_L, theta_U] such that P(theta in [L, U]) = 1 - alpha across repeated samples. Vision §1 default reports 95% CI alongside the point estimate."
  description_l3: "Coverage 1-alpha (default 0.95) per frequentist long-run interpretation; NOT a posterior probability. Wald, exact Clopper-Pearson, score, profile likelihood variants for different parameter spaces."
  invert_for_signal: false
  citations: ["Casella-Berger (2002) §9", "Clopper-Pearson (1934)"]

- metric_id: credible_interval
  name: "Bayesian credible interval"
  subcategory: uncertainty
  subcategory_index: 2
  layer_origin: L6
  unit: native_units
  update_frequency: on_request
  description_l1: "A range where we believe the true value lies with a certain probability."
  description_l2: "Bayesian interval [a, b] such that posterior P(theta in [a, b] | data) = 1 - alpha. Unlike a frequentist CI, this is an honest probability statement about the parameter given priors + data."
  description_l3: "Quantile-based credible interval uses posterior quantiles q_{alpha/2}, q_{1-alpha/2}; HPD interval is the shortest such interval. Bayes-theorem-driven; depends on prior choice."
  invert_for_signal: false
  citations: ["Gelman et al. (2013) Bayesian Data Analysis"]

- metric_id: forecast_error_sigma
  name: "Forecast error sigma"
  subcategory: uncertainty
  subcategory_index: 2
  layer_origin: L5b
  unit: native_units
  update_frequency: on_request
  description_l1: "How much the forecast typically misses by."
  description_l2: "Model-uncertainty sigma around the central forecast. One of the three sigma values in Vision §5 Triple sigma reporting; combines Ridge HAC SE + isotonic bootstrap SE."
  description_l3: "v2 quadrature (post-S-6): sigma_forecast^2 = sigma_ridge^2 + sigma_isotonic^2 + 2 * cov(ridge, isotonic) per Layer 5-E §5.E.3; cov term from joint bootstrap closes Codex/ChatGPT independence-assumption concern."
  invert_for_signal: false
  citations: ["LAYER_5_BUILD_SPEC.md §5.E"]

- metric_id: highest_posterior_density
  name: "Highest posterior density (HPD) interval"
  subcategory: uncertainty
  subcategory_index: 2
  layer_origin: L6
  unit: native_units
  update_frequency: on_request
  description_l1: "The shortest range that contains a chosen amount of probability."
  description_l2: "HPD region of level 1-alpha: {theta : p(theta|data) >= k} where k chosen so the region has posterior mass 1-alpha. Equals the quantile-based credible interval for unimodal symmetric posteriors."
  description_l3: "May be disconnected for multimodal posteriors; Box-Tiao (1973) construction. For Markov chain Monte Carlo posterior samples, computed via Chen-Shao (1999) shortest-interval algorithm."
  invert_for_signal: false
  citations: ["Box-Tiao (1973)", "Chen-Shao (1999)"]

- metric_id: prediction_interval
  name: "Prediction interval"
  subcategory: uncertainty
  subcategory_index: 2
  layer_origin: L6
  unit: native_units
  update_frequency: on_request
  description_l1: "A range we expect the next outcome to fall in."
  description_l2: "Interval [a, b] containing 1-alpha probability of the next-observation random variable, accounting for both parameter uncertainty AND irreducible noise. Always wider than the parameter confidence interval."
  description_l3: "For Gaussian linear regression, prediction interval at x_new is y_hat +/- z * sqrt(sigma_hat^2 (1 + x_new^T (X^T X)^{-1} x_new)); the extra 1 vs CI captures aleatory uncertainty."
  invert_for_signal: false
  citations: ["Hyndman-Athanasopoulos (2021) §5.5"]

- metric_id: standard_deviation
  name: "Standard deviation sigma"
  subcategory: uncertainty
  subcategory_index: 2
  layer_origin: L6
  unit: native_units
  update_frequency: on_request
  description_l1: "How spread out the values are around the average."
  description_l2: "sigma = sqrt(E[(X - mu)^2]); the basic measure of distributional spread. Sample SD uses (N-1) Bessel correction for unbiased variance estimation."
  description_l3: "Square root of variance; non-robust to outliers (use MAD for robust alternative). For non-normal distributions, sigma is necessary but insufficient to characterize distribution shape (need skewness + kurtosis)."
  range_min: 0.0
  invert_for_signal: false
  citations: ["Casella-Berger (2002) §1.6"]

# ============================================================================
# §3.3 — Confidence + Conviction (6)
# ============================================================================

- metric_id: confidence_score_pct
  name: "% Confidence (0-100)"
  subcategory: confidence_conviction
  subcategory_index: 3
  layer_origin: L6
  unit: percent
  update_frequency: on_request
  description_l1: "How sure we are about the forecast, on a scale of zero to a hundred."
  description_l2: "Meta-uncertainty score per Vision §4 formula: 25% Data Quality + 25% Model Agreement + 20% Regime Stability + 15% Analog Strength + 10% Sample Size minus 5% OOD Penalty."
  description_l3: "BINDING formula per Vision §4; hard caps per §10: 1Y/3Y/5Y = 85%, 10Y = 70%; signal conflict caps at 75%; OOD vs analogs caps at 70%. Enforced by L1.7-B V5 plus L1.7-D forecast-time helper."
  range_min: 0.0
  range_max: 100.0
  typical_range: [40.0, 85.0]
  invert_for_signal: false
  citations: ["Vision v2.0 §4", "Vision v2.0 §10"]

- metric_id: conviction_score
  name: "Conviction (1-10)"
  subcategory: confidence_conviction
  subcategory_index: 3
  layer_origin: L6
  unit: score_1_10
  update_frequency: on_request
  description_l1: "How strongly we'd act on the forecast, on a scale of one to ten."
  description_l2: "Position-sizing implication per Vision §4 formula: combines expected return attractiveness + asymmetry + model agreement + valuation + trend + liquidity, minus tail-risk + crowding + policy + decay penalties."
  description_l3: "BINDING per Vision §4. Critical rule: Conviction CAN BE LOWER THAN Confidence when risk/reward asymmetry is poor. Maps to position-sizing labels Avoid / Underweight / ... / Aggressive overweight."
  range_min: 1.0
  range_max: 10.0
  typical_range: [3.0, 8.0]
  invert_for_signal: false
  citations: ["Vision v2.0 §4"]

- metric_id: edge
  name: "Edge (expected-return advantage)"
  subcategory: confidence_conviction
  subcategory_index: 3
  layer_origin: L6
  unit: percent
  update_frequency: on_request
  description_l1: "How much the forecast says we'd earn above what's already priced in."
  description_l2: "Edge = forecast expected return minus market-implied expected return (e.g., ERP minus realized ERP percentile); positive edge supports long; negative edge supports caution/short."
  description_l3: "Maps to Kelly fraction f* = edge / variance; Kelly criterion (Kelly 1956) is the long-run growth-optimal fraction. Vision §1 reports edge in percent units alongside probability + confidence."
  invert_for_signal: false
  citations: ["Kelly (1956)"]

- metric_id: fractional_kelly
  name: "Fractional Kelly (0.25-0.50 f*)"
  subcategory: confidence_conviction
  subcategory_index: 3
  layer_origin: L6
  unit: ratio
  update_frequency: on_request
  description_l1: "A safer share of the Kelly bet to actually put on, given the world is not certain."
  description_l2: "Conservative scaling 0.25 to 0.50 of the full Kelly fraction; reduces drawdown risk when probabilities are estimated rather than known."
  description_l3: "Half-Kelly (0.50 f*) approximates the constant-relative-risk-aversion utility-maximizing fraction under log utility with estimation noise; quarter-Kelly (0.25 f*) is institutionally common for further drawdown protection."
  range_min: 0.0
  range_max: 0.5
  typical_range: [0.0, 0.5]
  invert_for_signal: false
  citations: ["MacLean-Thorp-Ziemba (2011)"]

- metric_id: kelly_fraction
  name: "Kelly fraction f*"
  subcategory: confidence_conviction
  subcategory_index: 3
  layer_origin: L6
  unit: ratio
  update_frequency: on_request
  description_l1: "The growth-optimal share of capital to bet on the forecast."
  description_l2: "f* = edge / variance under log utility (Kelly 1956). Always reported alongside fractional-Kelly variants for risk-managed implementation."
  description_l3: "For binary bets with win probability p, payout b: f* = (bp - q)/b where q = 1-p. Generalises to continuous returns: f* = mu/sigma^2 minus risk-free adjustment for excess-return formulation."
  invert_for_signal: false
  citations: ["Kelly (1956)", "Thorp (1969)"]

- metric_id: probability_numeric
  name: "Probability (numeric Bayesian posterior)"
  subcategory: confidence_conviction
  subcategory_index: 3
  layer_origin: L6
  unit: probability
  update_frequency: on_request
  description_l1: "The headline percent chance of the outcome."
  description_l2: "Bayesian posterior probability P(outcome | data); central forecast number. Always reported alongside CI lower/upper + % Confidence + Conviction per Vision §4 Triple Decomposition (BINDING)."
  description_l3: "Worked derivation per Vision §4: base_rate x likelihood_adjustment x regime_adjustment, with each factor decomposable for L3 audit. CI from L5b ensemble bootstrap (stationary block per Politis-Romano 1994)."
  range_min: 0.0
  range_max: 1.0
  typical_range: [0.0, 1.0]
  invert_for_signal: false
  citations: ["Vision v2.0 §4", "Politis-Romano (1994)"]

# ============================================================================
# §3.4 — Goodness-of-fit + Calibration (10)
# ============================================================================

- metric_id: adjusted_r_squared
  name: "Adjusted R-squared"
  subcategory: goodness_fit_calibration
  subcategory_index: 4
  layer_origin: L5
  unit: ratio
  update_frequency: on_request
  description_l1: "How well the model fits, accounting for using more features."
  description_l2: "R^2_adj = 1 - (1 - R^2) (n - 1) / (n - k - 1); penalises adding predictors that do not improve fit. Always less than or equal to R^2."
  description_l3: "Approximates the unbiased estimator of the population R^2 in the linear-model case; Theil (1961). Vision §3 mandates reporting alongside R^2 for any multi-feature regression."
  range_max: 1.0
  typical_range: [-0.2, 1.0]
  invert_for_signal: false
  citations: ["Theil (1961)"]

- metric_id: auc_roc
  name: "AUC under ROC curve"
  subcategory: goodness_fit_calibration
  subcategory_index: 4
  layer_origin: L5b
  unit: ratio
  update_frequency: on_request
  description_l1: "How well the model separates ups from downs, where 1.0 is perfect and 0.5 is random."
  description_l2: "Area under the Receiver Operating Characteristic curve; integrates true-positive rate against false-positive rate across all classification thresholds. Discrimination-focused metric."
  description_l3: "AUC = P(score(positive) > score(negative)) for randomly selected positive/negative pair; equivalent to Mann-Whitney U statistic normalised. Insensitive to calibration; pair with Brier for full assessment."
  range_min: 0.0
  range_max: 1.0
  typical_range: [0.5, 0.8]
  invert_for_signal: false
  citations: ["Hanley-McNeil (1982)"]

- metric_id: brier_improvement_vs_climatology
  name: "Brier improvement vs climatology"
  subcategory: goodness_fit_calibration
  subcategory_index: 4
  layer_origin: L5b
  unit: ratio
  update_frequency: on_request
  description_l1: "How much better the forecast is than just guessing the historical average."
  description_l2: "1 - (Brier_model / Brier_climatology); positive values mean model beats the naive constant-rate baseline. Vision §13 Calibration Public Accountability reports this prominently."
  description_l3: "Climatology = constant forecast equal to historical base rate; benchmark for skill assessment per Murphy (1973) decomposition. Negative values signal a model that is statistically worse than knowing nothing."
  typical_range: [-0.2, 0.5]
  invert_for_signal: false
  citations: ["Murphy (1973)", "Vision v2.0 §13"]

- metric_id: brier_score
  name: "Brier score"
  subcategory: goodness_fit_calibration
  subcategory_index: 4
  layer_origin: L5b
  unit: ratio
  update_frequency: on_request
  description_l1: "Average squared error of probability forecasts; lower is better."
  description_l2: "Brier = (1/N) sum (p_i - y_i)^2 where p_i in [0,1] is forecast, y_i in {0,1} is realised outcome. Lower is better; bounded in [0, 1] for binary outcomes."
  description_l3: "Strictly proper scoring rule (Brier 1950); decomposes into reliability + resolution + uncertainty per Murphy (1973). Regime-conditional Brier per L5b-D supports recession vs expansion sub-sample assessment."
  range_min: 0.0
  range_max: 1.0
  typical_range: [0.0, 0.5]
  invert_for_signal: true
  citations: ["Brier (1950)", "Murphy (1973)"]

- metric_id: calibration_slope
  name: "Calibration slope"
  subcategory: goodness_fit_calibration
  subcategory_index: 4
  layer_origin: L5b
  unit: ratio
  update_frequency: on_request
  description_l1: "Whether forecasts of 70% really happen about 70% of the time."
  description_l2: "Slope of realised-outcome rate regressed on forecast probability; 1.0 is perfect calibration; >1 underconfident, <1 overconfident. Vision §13 mandates publication of calibration slope alongside Brier."
  description_l3: "Cox (1958) calibration regression: logit(y) = alpha + beta * logit(p_hat); beta=1, alpha=0 is perfect. Reliability diagram is the binned visualisation; isotonic post-hoc calibration (L5-RM-6) corrects systematic miscalibration."
  typical_range: [0.5, 1.5]
  invert_for_signal: false
  citations: ["Cox (1958)", "Vision v2.0 §13"]

- metric_id: crps
  name: "Continuous Ranked Probability Score (CRPS)"
  subcategory: goodness_fit_calibration
  subcategory_index: 4
  layer_origin: L5
  unit: native_units
  update_frequency: on_request
  description_l1: "How well a full forecast distribution matches realised outcomes; lower is better."
  description_l2: "CRPS = integral (F(x) - 1{y <= x})^2 dx; generalises Brier from binary to continuous outcomes. Strictly proper for evaluating distributional forecasts."
  description_l3: "For Gaussian forecast N(mu, sigma^2) and observation y, closed-form CRPS = sigma * (1/sqrt(pi) - 2 phi((y-mu)/sigma)) + (y-mu)*(2 Phi((y-mu)/sigma) - 1). Implementation in L5 scoring module."
  range_min: 0.0
  invert_for_signal: true
  citations: ["Matheson-Winkler (1976)", "Gneiting-Raftery (2007)"]

- metric_id: log_loss
  name: "Logarithmic loss (cross-entropy)"
  subcategory: goodness_fit_calibration
  subcategory_index: 4
  layer_origin: L5b
  unit: nats
  update_frequency: on_request
  description_l1: "How surprised we are by what actually happened; lower is better."
  description_l2: "log_loss = -(1/N) sum (y_i log p_i + (1-y_i) log (1-p_i)); information-theoretic loss; strictly proper. Heavily penalises confident wrong predictions."
  description_l3: "Equals negative log-likelihood of Bernoulli; cross-entropy between forecast and one-hot truth distribution. Penalty for p_i = 0 when y_i = 1 is infinite; small-probability floor (epsilon clip) is standard."
  range_min: 0.0
  invert_for_signal: true
  citations: ["Good (1952)"]

- metric_id: r_squared
  name: "R-squared (coefficient of determination)"
  subcategory: goodness_fit_calibration
  subcategory_index: 4
  layer_origin: L5
  unit: ratio
  update_frequency: on_request
  description_l1: "What share of variation the model explains, where 1.0 is perfect."
  description_l2: "R^2 = 1 - SS_res / SS_tot; share of variance in the outcome explained by the model. Can be negative for OOS evaluation (worse than mean baseline)."
  description_l3: "In-sample R^2 monotone non-decreasing in features added; OOS R^2 the institutionally meaningful version. Vision §3 mandates pairing with adjusted R^2 for multi-feature comparison."
  range_max: 1.0
  typical_range: [-0.5, 1.0]
  invert_for_signal: false
  citations: ["Wright (1921)"]

- metric_id: reliability_diagram
  name: "Reliability diagram"
  subcategory: goodness_fit_calibration
  subcategory_index: 4
  layer_origin: L5b
  unit: visual
  update_frequency: on_request
  description_l1: "A chart that shows whether predicted percentages match reality."
  description_l2: "Binned plot of realised outcome rate vs forecast probability; perfect calibration is the 45-degree line. Vision §13 mandates publication alongside Brier score."
  description_l3: "Murphy (1973) reliability decomposition Brier = REL - RES + UNC; reliability diagram is the visual companion. Adaptive bin reduction (L5b-KICK-3) handles small-N tail bins."
  invert_for_signal: false
  citations: ["Murphy (1973)", "DeGroot-Fienberg (1983)"]

- metric_id: sharpness
  name: "Sharpness (forecast concentration)"
  subcategory: goodness_fit_calibration
  subcategory_index: 4
  layer_origin: L5b
  unit: ratio
  update_frequency: on_request
  description_l1: "How concentrated the forecast is around its central estimate."
  description_l2: "Average forecast variance across the test set; smaller is sharper. A sharp + calibrated forecast is preferred to a vague + calibrated one (Gneiting-Balabdaoui-Raftery 2007)."
  description_l3: "Sharpness alone is not desirable (sharp wrong is worse than vague right); calibration is the necessary condition + sharpness is the further skill margin per Gneiting et al. (2007) maximise-sharpness-subject-to-calibration principle."
  range_min: 0.0
  invert_for_signal: true
  citations: ["Gneiting-Balabdaoui-Raftery (2007)"]

# ============================================================================
# §3.5 — Statistical significance (9)
# ============================================================================

- metric_id: degrees_of_freedom
  name: "Degrees of freedom (df)"
  subcategory: statistical_significance
  subcategory_index: 5
  layer_origin: L5
  unit: count
  update_frequency: on_request
  description_l1: "How many independent pieces of information went into a statistic."
  description_l2: "Sample size n minus number of fitted parameters; tunes t/F/chi-squared distributions. Low df widens critical values + reduces power."
  description_l3: "For Newey-West HAC SE the effective df accounts for bandwidth + autocorrelation; HAC-adjusted df can be substantially below n. Vision §10 sample-size honesty plus Hodrick (1992) overlapping-obs adjustment relevant."
  range_min: 0.0
  invert_for_signal: false
  citations: ["Fisher (1925)"]

