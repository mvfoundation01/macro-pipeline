  update_frequency: on_request
  description_l1: "Average loss in the worst scenarios beyond a chosen threshold."
  description_l2: "CVaR_alpha = E[L | L > VaR_alpha]; the expected loss conditional on being in the tail. Coherent risk measure (Artzner-Delbaen-Eber-Heath 1999); preferred over VaR for regulatory + institutional use."
  description_l3: "CVaR is subadditive (passes the diversification axiom); VaR is not. For Gaussian losses, closed form CVaR_alpha = mu + sigma * phi(z_alpha) / (1 - alpha) where z_alpha is the standard normal alpha-quantile."
  invert_for_signal: true
