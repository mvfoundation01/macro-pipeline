  description_l2: "MDD = min_{t1 < t2} (P_{t2} - max_{s <= t1} P_s) / max_{s <= t1} P_s; the largest cumulative loss from running maximum. Pain-relevant for investor experience."
  description_l3: "Magdon-Ismail (2004) Brownian-motion expected MDD scales like sigma sqrt(T) log(T); empirical MDD typically exceeds Gaussian prediction due to fat tails + autocorrelation."
