  layer_origin: L6
  unit: ratio
  update_frequency: on_request
  description_l1: "Excess return over a benchmark per unit of tracking error."
  description_l2: "IR = (R_p - R_b) / TE; measures active-management skill independent of benchmark beta exposure. Goodwin (1998) institutional usage."
  description_l3: "TE = sigma(R_p - R_b). Annualisation by sqrt(periods_per_year). IR > 0.5 indicates plausible skill; >1.0 exceptional. Bayesian shrinkage advisable due to small-N inflation."
  invert_for_signal: false
  citations: ["Goodwin (1998)"]

