  update_frequency: on_request
  description_l1: "How much knowing one thing tells you about another."
  description_l2: "I(X; Y) = D_KL(P(X, Y) || P(X) P(Y)) = sum P(x, y) log (P(x, y) / (P(x) P(y))); generalises correlation to non-linear dependencies; zero iff X and Y independent."
  description_l3: "Reiterates the Kullback-Leibler divergence between joint and product-of-marginals; symmetric. Estimation in finite samples is subtle (Kraskov et al. 2004 k-nearest-neighbours estimator)."
  range_min: 0.0
  invert_for_signal: false
  citations: ["Cover-Thomas (2006)", "Kraskov-Stogbauer-Grassberger (2004)"]

- metric_id: shannon_entropy
  name: "Shannon entropy H(X)"
  subcategory: information_theory
  subcategory_index: 9
  layer_origin: L6
  unit: nats
  update_frequency: on_request
  description_l1: "How uncertain or spread out a distribution of outcomes is."
  description_l2: "H(X) = -sum_x P(x) log P(x); average information content (in nats if log is natural, bits if log_2). Maximal for the uniform distribution."
  description_l3: "Shannon (1948); foundational for information theory. Useful as a meta-uncertainty measure complementing variance for discrete distributions."
  range_min: 0.0
  invert_for_signal: false
  citations: ["Shannon (1948)"]

# ============================================================================
# §3.10 — Bayesian measures (7)
# ============================================================================

- metric_id: bayes_factor
  name: "Bayes factor BF"
  subcategory: bayesian
  subcategory_index: 10
  layer_origin: L6
  unit: ratio
  update_frequency: on_request
  description_l1: "How much the data favours one model over another."
  description_l2: "BF_{10} = P(data | M_1) / P(data | M_0); the ratio of marginal likelihoods. Kass-Raftery (1995) interpretation: BF > 3 substantial; BF > 10 strong; BF > 100 decisive."
  description_l3: "Bayesian analogue of likelihood ratio for non-nested models. Sensitive to prior choice; Bayesian information criterion BIC = -2 log P(data | M) approximates -2 log BF + constants."
  range_min: 0.0
  invert_for_signal: false
  citations: ["Kass-Raftery (1995)"]

- metric_id: likelihood_function
  name: "Likelihood P(D | theta)"
  subcategory: bayesian
  subcategory_index: 10
  layer_origin: L6
  unit: density
  update_frequency: on_request
  description_l1: "How well a parameter value explains the data we saw."
  description_l2: "L(theta; D) = product f(d_i; theta) for iid samples; the data-conditional probability density viewed as a function of theta. Combines with prior to yield posterior."
  description_l3: "Maximum likelihood estimator theta_hat_MLE = argmax L(theta; D); asymptotically normal with covariance Fisher information inverse. Profile likelihood for nuisance parameter elimination."
  invert_for_signal: false
  citations: ["Fisher (1922)"]

- metric_id: map_estimate
  name: "Maximum a posteriori (MAP) estimate"
  subcategory: bayesian
  subcategory_index: 10
  layer_origin: L6
  unit: native_units
  update_frequency: on_request
  description_l1: "The single most likely value of a parameter given the data and prior."
  description_l2: "theta_MAP = argmax_theta p(theta | D) = argmax_theta L(D; theta) pi(theta); the mode of the posterior. Reduces to MLE when prior is uniform/flat."
  description_l3: "Penalised maximum likelihood interpretation: MAP = argmax (log L + log pi); L2 prior = ridge; Laplace prior = lasso. Point summary; complement with posterior credible interval for uncertainty."
  invert_for_signal: false
  citations: ["Gauss (1809)", "Hoerl-Kennard (1970)"]

- metric_id: marginal_likelihood
  name: "Marginal likelihood / evidence P(D)"
  subcategory: bayesian
  subcategory_index: 10
  layer_origin: L6
  unit: density
  update_frequency: on_request
  description_l1: "How likely the data is overall, averaged across all parameter values."
  description_l2: "P(D) = integral P(D | theta) pi(theta) dtheta; the normalising constant in Bayes' theorem. Sensitive to prior; central to Bayes factor + BIC."
  description_l3: "Computationally hard for high-dimensional theta; Chib (1995) marginal likelihood from posterior samples; bridge sampling; nested sampling per Skilling (2006). BIC = -2 log P(D | M) approximation."
  range_min: 0.0
  invert_for_signal: false
  citations: ["Chib (1995)", "Skilling (2006)"]

- metric_id: mcmc_r_hat
  name: "MCMC R-hat (Gelman-Rubin convergence diagnostic)"
  subcategory: bayesian
  subcategory_index: 10
  layer_origin: L6
  unit: ratio
  update_frequency: on_request
  description_l1: "A diagnostic that flags whether the chains used to estimate a Bayesian model have settled down."
  description_l2: "R-hat = sqrt(between-chain variance / within-chain variance); values close to 1.0 indicate convergence. R-hat > 1.1 flags non-convergence; current best practice uses 1.01 threshold."
  description_l3: "Gelman-Rubin (1992) potential scale reduction factor; Vehtari et al. (2021) rank-normalised improved diagnostic. Pairs with effective sample size diagnostic + trace plots."
  range_min: 1.0
  typical_range: [1.0, 1.5]
  invert_for_signal: true
  citations: ["Gelman-Rubin (1992)", "Vehtari et al. (2021)"]

- metric_id: posterior_theta
  name: "Posterior P(theta | D)"
  subcategory: bayesian
  subcategory_index: 10
  layer_origin: L6
  unit: density
  update_frequency: on_request
  description_l1: "Our updated belief about a parameter after seeing the data."
  description_l2: "P(theta | D) = P(D | theta) pi(theta) / P(D) by Bayes' theorem. Full distribution over theta; summaries include mean, MAP, credible interval."
  description_l3: "Conjugate-prior families admit closed-form posteriors (Gelman et al. 2013 chapter 2); otherwise approximated via MCMC, variational inference, or nested sampling."
  invert_for_signal: false
  citations: ["Bayes (1763)", "Gelman et al. (2013)"]

- metric_id: prior_theta
  name: "Prior pi(theta)"
  subcategory: bayesian
  subcategory_index: 10
  layer_origin: L6
  unit: density
  update_frequency: on_request
  description_l1: "Our belief about a parameter before seeing the data."
  description_l2: "pi(theta); inputs domain knowledge + prior empirical evidence. Sensitivity analysis (Vision §1 Pillar 2) reports posterior under multiple prior choices."
  description_l3: "Conjugate priors yield analytically tractable posteriors. Weakly-informative / reference / Jeffreys priors for sensitivity analysis. Vision §10 mandates 6.5% real return prior at 10Y horizon (Shrinkage anchor)."
  invert_for_signal: false
  citations: ["Jeffreys (1961)", "Vision v2.0 §10"]

